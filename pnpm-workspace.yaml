allowBuilds:
  "@nestjs/core": true
  "@scarf/scarf": true
  argon2: true
  puppeteer: true

# dependency behavior
dedupeDirectDeps: true

# hoisting behavior
hoist: true

ignoreWorkspaceRootCheck: true
legacyPeerDeps: true
onlyBuiltDependencies:
  - "@firebase/util"
  - "@nestjs/core"
  - "@scarf/scarf"
  - "@swc/core"
  - argon2
  - core-js
  - cpu-features
  - nestjs-pino
  - protobufjs
  - sharp
  - ssh2
  - unrs-resolver
overrides:
  '@hapi/content@<=6.0.0': '>=6.0.1'
  '@tootallnate/once@<3.0.1': '>=3.0.1'
  ajv@<6.14.0: '>=6.14.0'
  axios@>=1.0.0 <1.15.0: '>=1.15.0'
  axios@>=1.0.0 <1.15.1: '>=1.15.1'
  axios@>=1.0.0 <1.15.2: '>=1.15.2'
  brace-expansion@<1.1.13: '>=1.1.13'
  brace-expansion@>=2.0.0 <2.0.3: '>=2.0.3'
  cookie@<0.7.0: '>=0.7.0'
  diff@>=4.0.0 <4.0.4: '>=4.0.4'
